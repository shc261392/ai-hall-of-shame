name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable && corepack prepare pnpm@10.6.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable && corepack prepare pnpm@10.6.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable && corepack prepare pnpm@10.6.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: corepack enable && corepack prepare pnpm@10.6.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: npx playwright install --with-deps chromium

      - name: Create local env
        run: |
          cat > .env <<'EOF'
          JWT_SECRET=ci-test-secret-that-is-long-enough-for-hs256
          WEBAUTHN_RP_ID=localhost
          WEBAUTHN_RP_NAME=AHOS-CI
          WEBAUTHN_ORIGIN=http://localhost:5173
          ENVIRONMENT=development
          EOF

      - name: Setup local D1
        run: pnpm dev:setup

      - name: Generate SvelteKit types
        run: pnpm exec svelte-kit sync

      - run: pnpm test
