name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel in-progress runs on the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # .svelte-kit/ is gitignored; vitest needs the generated tsconfig
      - run: pnpm exec svelte-kit sync
      - run: pnpm test

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # platformProxy reads string bindings from .dev.vars, not .env
      - name: Create config files
        run: |
          cat > .dev.vars << 'EOF'
          JWT_SECRET=ci-test-secret-that-is-long-enough-for-hs256
          WEBAUTHN_RP_ID=localhost
          WEBAUTHN_RP_NAME=AHOS-CI
          WEBAUTHN_ORIGIN=http://localhost:5173
          ENVIRONMENT=development
          EOF
          cp .dev.vars .env

      - name: Setup local D1 database
        run: pnpm dev:setup

      # .svelte-kit/ is gitignored; vite dev needs the generated tsconfig
      - run: pnpm exec svelte-kit sync

      - name: Start dev server
        run: |
          pnpm dev > /tmp/server.log 2>&1 &
          echo "DEV_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:5173 >/dev/null 2>&1; then
              echo "Server ready in ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Dev server failed to start within 60s"
          cat /tmp/server.log
          exit 1

      - run: pnpm test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
