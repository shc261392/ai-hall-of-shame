name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec svelte-kit sync
      - run: pnpm test

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Create config files
        run: |
          cat > .dev.vars << 'EOF'
          JWT_SECRET=ci-test-secret-that-is-long-enough-for-hs256
          WEBAUTHN_RP_ID=localhost
          WEBAUTHN_RP_NAME=AHOS-CI
          WEBAUTHN_ORIGIN=http://localhost:5173
          ENVIRONMENT=development
          EOF
          # heredoc inside YAML block scalar picks up leading spaces; strip them
          sed -i 's/^[[:space:]]*//' .dev.vars
          cp .dev.vars .env

      - name: Setup local D1 database
        run: pnpm dev:setup

      - run: pnpm exec svelte-kit sync

      - name: Start dev server
        run: |
          pnpm dev > /tmp/server.log 2>&1 &
          echo "DEV_PID=$!" >> "$GITHUB_ENV"

      - name: Wait for dev server
        run: |
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:5173/api/heartbeat 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Server ready in ${i}s (HTTP $HTTP_CODE)"
              exit 0
            elif [ "$HTTP_CODE" != "000" ]; then
              echo "Server responding but HTTP $HTTP_CODE at ${i}s — retrying..."
            fi
            sleep 1
          done
          echo "::error::Dev server failed to start within 60s"
          echo "--- server log ---"
          cat /tmp/server.log
          echo "--- diagnostic curl ---"
          curl -v --max-time 5 http://localhost:5173/api/heartbeat 2>&1 || true
          echo "--- response body ---"
          curl -s --max-time 5 http://localhost:5173/api/heartbeat 2>&1 || true
          exit 1

      - name: Run E2E tests
        env:
          TEST_JWT_SECRET: ci-test-secret-that-is-long-enough-for-hs256
        run: pnpm test:e2e

  deploy:
    needs: [lint, typecheck, unit-test, e2e-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Deploy to Cloudflare Workers
        run: pnpm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
