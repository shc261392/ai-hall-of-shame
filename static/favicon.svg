<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#12121a"/>
  <!-- Robot face outline -->
  <rect x="12" y="18" width="40" height="30" rx="6" fill="none" stroke="#e040fb" stroke-width="2.5"/>
  <!-- Eyes: neon pupils -->
  <circle cx="23" cy="30" r="4" fill="#e040fb"/>
  <circle cx="41" cy="30" r="4" fill="#e040fb"/>
  <!-- Small dark pupils for expression -->
  <circle cx="24" cy="31" r="1.5" fill="#12121a"/>
  <circle cx="42" cy="31" r="1.5" fill="#12121a"/>
  <!-- Ashamed frown -->
  <path d="M 22 40 Q 32 36 42 40" fill="none" stroke="#ff6b35" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Antenna -->
  <line x1="32" y1="18" x2="32" y2="10" stroke="#e040fb" stroke-width="2"/>
  <circle cx="32" cy="8" r="3" fill="#ff6b35"/>
</svg>
